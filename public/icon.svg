<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="120" fill="#0a0a0f"/>
  <!-- Sfondo sfumato -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Cerchio esterno glow -->
  <circle cx="256" cy="220" r="130" fill="url(#g1)" opacity="0.15"/>
  <!-- Libro / pagine -->
  <rect x="156" y="150" width="90" height="120" rx="10" fill="url(#g1)" opacity="0.9"/>
  <rect x="166" y="140" width="90" height="120" rx="10" fill="url(#g2)"/>
  <!-- Linee sul libro -->
  <rect x="182" y="168" width="58" height="6" rx="3" fill="white" opacity="0.6"/>
  <rect x="182" y="184" width="48" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="182" y="200" width="52" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="182" y="216" width="44" height="6" rx="3" fill="white" opacity="0.3"/>
  <!-- Stella in alto a destra -->
  <circle cx="340" cy="170" r="32" fill="#1a1a2e"/>
  <circle cx="340" cy="170" r="28" fill="url(#g1)" opacity="0.3"/>
  <text x="340" y="178" text-anchor="middle" font-size="28" fill="#fbbf24">★</text>
  <!-- Tick / check in basso -->
  <circle cx="310" cy="310" r="48" fill="url(#g1)"/>
  <polyline points="290,310 305,326 332,296" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Punto decorativo piccolo -->
  <circle cx="175" cy="320" r="10" fill="#6366f1" opacity="0.5"/>
  <circle cx="150" cy="290" r="6" fill="#8b5cf6" opacity="0.3"/>
</svg>
