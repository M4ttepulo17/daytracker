<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle glow in background -->
  <circle cx="256" cy="200" r="180" fill="url(#accent)" opacity="0.07"/>

  <!-- Main card/journal shape -->
  <rect x="130" y="100" width="200" height="260" rx="20" fill="url(#accent)" opacity="0.25" filter="url(#shadow)"/>
  <rect x="140" y="90" width="200" height="260" rx="20" fill="url(#glow)" opacity="0.9"/>

  <!-- Lines on the card -->
  <rect x="168" y="130" width="144" height="10" rx="5" fill="white" opacity="0.85"/>
  <rect x="168" y="156" width="120" height="10" rx="5" fill="white" opacity="0.55"/>
  <rect x="168" y="182" width="132" height="10" rx="5" fill="white" opacity="0.55"/>
  <rect x="168" y="208" width="100" height="10" rx="5" fill="white" opacity="0.35"/>
  <rect x="168" y="234" width="116" height="10" rx="5" fill="white" opacity="0.35"/>

  <!-- Check circle in bottom right -->
  <circle cx="330" cy="330" r="68" fill="#0f0f1a"/>
  <circle cx="330" cy="330" r="60" fill="url(#accent)" filter="url(#shadow)"/>
  <!-- Checkmark -->
  <polyline points="304,330 322,350 358,308"
    stroke="white" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

  <!-- Small star accent top right -->
  <circle cx="370" cy="130" r="22" fill="#1a1a2e" opacity="0.8"/>
  <text x="370" y="138" text-anchor="middle" font-size="22" fill="#fbbf24">★</text>
</svg>
